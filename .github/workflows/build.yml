name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          npm version "$tag" --no-git-tag-version --allow-same-version

      - name: Validate icon.png
        run: |
          size=$(wc -c < assets/icon.png | tr -d ' ')
          if [ "$size" -lt 1000 ]; then
            echo "assets/icon.png is invalid (${size} bytes)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: huaci-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 5
          retry_wait_seconds: 30
          command: |
            tag="${GITHUB_REF#refs/tags/}"
            files=$(find dist -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.zip" \))
            if [ -z "$files" ]; then
              echo "No release files found"
              find dist -type f || true
              exit 1
            fi
            gh release view "$tag" --repo "$GITHUB_REPOSITORY" 2>/dev/null || \
              gh release create "$tag" \
                --repo "$GITHUB_REPOSITORY" \
                --title "划词助手 ${tag}" \
                --generate-notes
            echo "$files" | while read -r file; do
              gh release upload "$tag" "$file" --clobber --repo "$GITHUB_REPOSITORY"
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
